services:
  - type: web
    name: dexi
    runtime: node
    buildCommand: bash render-build.sh
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dexi-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false

databases:
  - name: dexi-db
    databaseName: dexi
    user: dexi
